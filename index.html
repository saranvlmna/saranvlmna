    <style>
      :root {
        --bg: #0d0d0d;
        --fg: #33ff66;
        --accent: #9dff70;
        --dim: #1f7a3a;
        --white: #d8ffe0;
        --prompt: #33ff66;
        --glow: 0 0 14px rgba(157, 255, 112, 0.45);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: #050505;
        font-family: "JetBrains Mono", monospace;
      }
      @keyframes blink {
        0%,
        49% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }
      .term-page {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: radial-gradient(ellipse at 50% 0%, #101010 0%, #050505 70%);
      }
      .term-window {
        width: 100%;
        max-width: 940px;
        height: 84vh;
        min-height: 520px;
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        overflow: hidden;
        background: var(--bg);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6),
          0 0 0 1px rgba(255, 255, 255, 0.04);
      }
      .term-titlebar {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 11px 16px;
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex: none;
      }
      .term-dots {
        display: flex;
        gap: 8px;
      }
      .term-dot {
        width: 13px;
        height: 13px;
        border-radius: 50%;
        display: inline-block;
      }
      .term-titlebar-title {
        flex: 1;
        text-align: center;
        font-size: 12.5px;
        color: var(--dim);
        font-weight: 500;
        letter-spacing: 0.3px;
      }
      .term-titlebar-spacer {
        width: 52px;
      }
      .term-scroll {
        flex: 1;
        overflow-y: auto;
        padding: 20px 22px 26px;
        font-size: 14px;
        line-height: 1.65;
        color: var(--white);
        cursor: text;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .term-scroll::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      .term-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .term-scroll::-webkit-scrollbar-thumb {
        background: var(--dim);
        border-radius: 10px;
      }
      .term-scroll a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px dotted var(--dim);
      }
      .term-scroll a:hover {
        color: var(--white);
        border-bottom-color: var(--accent);
      }
      .term-block {
        white-space: pre-wrap;
        word-break: break-word;
      }
      .term-input-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 2px;
      }
      .term-prompt {
        color: var(--prompt);
        font-weight: 600;
        flex: none;
      }
      .term-input-wrap {
        position: relative;
        flex: 1;
        min-width: 0;
      }
      .term-input-echo {
        color: var(--white);
        white-space: pre;
      }
      .term-cursor {
        display: inline-block;
        width: 8px;
        height: 16px;
        background: var(--accent);
        box-shadow: var(--glow);
        vertical-align: middle;
        margin-left: 1px;
        animation: blink 1.05s steps(1) infinite;
      }
      .term-input {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        color: transparent;
        caret-color: transparent;
        font: inherit;
        padding: 0;
        margin: 0;
      }
    </style>
  </head>

          r.setProperty("--accent", t.accent);

        function out_theme(arg) {
          const names = Object.keys(themes);
          if (arg && names.includes(arg)) {
            applyTheme(arg);
            return c(`✓ theme → ${arg}`, "var(--accent)");
          }
          if (arg) {
            return (
              c(`unknown theme: ${arg}`, "#ff6b6b") +
              c(`  ·  available: ${names.join(", ")}`, "var(--dim)")
            );
          }
          const cur = curTheme || "matrix";
          const idx = (names.indexOf(cur) + 1) % names.length;
          applyTheme(names[idx]);
          return `<div>${c(
            `✓ theme → ${names[idx]}`,
            "var(--accent)"
          )}<br/><span style="color:var(--dim);">cycle again with </span><span style="color:var(--accent);">theme</span><span style="color:var(--dim);">, or pick: ${names.join(
            " · "
          )}</span></div>`;
        }

        function run(raw) {
          const cmd = raw.trim();
          push(
            `<div style="display:flex;gap:8px;"><span style="color:var(--prompt);font-weight:600;flex:none;">${promptStr}</span><span style="color:var(--white);white-space:pre-wrap;word-break:break-word;">${cmd.replace(
              /</g,
              "&lt;"
            )}</span></div>`
          );
          if (!cmd) return;
          history.push(cmd);
          histIdx = history.length;
          const [name, ...rest] = cmd.split(/\s+/);
          const arg = rest.join(" ").toLowerCase();
          const n = name.toLowerCase();

          if (n === "clear") {
            clearBlocks();
            return;
          }
          const map = {
            help: out_help,
            about: out_about,
            experience: out_experience,
            skills: out_skills,
            projects: out_projects,
            contact: out_contact,
            socials: out_socials,
            resume: out_resume,
            cv: out_resume,
            neofetch: out_neofetch,
            banner: out_banner,
            whoami: () => c("saranjith — " + data.role, "var(--white)"),
            ls: () => c(cmdList.join("   "), "var(--accent)"),
            pwd: () => c("/home/saran", "var(--white)"),
            echo: () => c(arg || "", "var(--white)"),
            sudo: () =>
              c(
                "nice try 😏 — you already have everything you need here.",
                "var(--dim)"
              ),
            date: () => c(new Date().toString(), "var(--white)")
          };
          if (n === "theme") {
            push(out_theme(arg));
            return;
          }
          if (map[n]) {
            push(map[n]());
            return;
          }
          push(
            `<div>${c(
              `command not found: ${name.replace(/</g, "&lt;")}`,
              "#ff6b6b"
            )}  ${c("— type ", "var(--dim)")}${c(
              "help",
              "var(--accent)"
            )}</div>`
          );
        }

        function updateEcho() {
          inputEcho.textContent = inputEl.value;
        }

        inputEl.addEventListener("input", updateEcho);

        inputEl.addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            const v = inputEl.value;
            inputEl.value = "";
            updateEcho();
            run(v);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            if (history.length) {
              histIdx = Math.max(0, histIdx - 1);
              inputEl.value = history[histIdx] || "";
              updateEcho();
            }
          } else if (e.key === "ArrowDown") {
            e.preventDefault();
            if (history.length) {
              histIdx = Math.min(history.length, histIdx + 1);
              inputEl.value = history[histIdx] || "";
              updateEcho();
            }
          } else if (e.key === "Tab") {
            e.preventDefault();
            const cur = inputEl.value.trim().toLowerCase();
            if (!cur) return;
            const match = cmdList.filter((cd) => cd.startsWith(cur));
            if (match.length === 1) {
              inputEl.value = match[0];
              updateEcho();
            } else if (match.length > 1) {
              push(c(match.join("   "), "var(--dim)"));
            }
          } else if (e.key === "l" && e.ctrlKey) {
            e.preventDefault();
            clearBlocks();
          }
        });

        scrollEl.addEventListener("click", () => inputEl.focus());

        promptEl.textContent = promptStr;

        boot();
      })();
    </script>
  </body>
</html>
